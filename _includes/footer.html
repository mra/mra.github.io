<footer class="site-footer">
  <div class="container footer-inner">
    <div class="footer-left">
      <span>&copy; {{ 'now' | date: '%Y' }} {{ site.author.name }}</span>
      <span class="dot">·</span>
      <span>{{ site.author.affiliation }}</span>
    </div>
    <div class="footer-right">
      <a href="mailto:{{ site.author.work_email }}" aria-label="Email">{{ site.author.work_email }}</a>
      <a href="https://github.com/{{ site.author.github }}" aria-label="GitHub" target="_blank" rel="noopener">GitHub</a>
      <a href="https://linkedin.com/in/{{ site.author.linkedin }}" aria-label="LinkedIn" target="_blank" rel="noopener">LinkedIn</a>
    </div>
  </div>
</footer>
