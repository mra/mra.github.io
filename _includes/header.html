<header class="site-header">
  <div class="container header-inner">
    <a href="{{ '/' | relative_url }}" class="site-brand">
      <span class="brand-name">Manoja Aravindakshan</span>
      <span class="brand-sub">{{ site.author.role }}</span>
    </a>
    <nav class="site-nav">
      <input type="checkbox" id="nav-toggle" class="nav-toggle">
      <label for="nav-toggle" class="nav-toggle-label" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </label>
      <ul class="nav-list">
        {% for item in site.nav %}
          <li><a href="{{ item.url | relative_url }}" {% if page.url contains item.url %}class="active"{% endif %}>{{ item.title }}</a></li>
        {% endfor %}
      </ul>
    </nav>
  </div>
</header>
